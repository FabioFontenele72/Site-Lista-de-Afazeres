<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codigo alta perfomance</title>
    <link rel="stylesheet" href="style.css" />
    
</head>
<body>
    <header>
        <h1>Minhas Lista de Afazeres</h1>
    </header>

    <main>
        <section id="Formulario">
            <input type="text" id="nova-tarefa"
            placeholder="Digite..."/>
            <button id='btnAdicionar'>
                Adicionar
            </button>

        </section>
        <section id="lista-de-tarefas"> 
            <ul id="lista">
                <li class="bloco-tarefa">
                    <span class="tarefa">
                        Lavar a Sala
                    </span>
                    <div class="btn-task">
                        <button class="Editar">&#9998;</button>
                        <button class="Excluir">&#128465;</button>
                    </div>
                </li>
                <li class="bloco-tarefa">
                    <span class="tarefa">
                        Dar Banho no Cachorros
                    </span>
                    <div class="btn-task">
                        <button class="Editar">&#9998;</button>
                        <button class="Excluir">&#128465;</button>
                    </div>
                </li>
                <li class="bloco-tarefa">
                    <span class="tarefa">
                        Lavar a Roupa
                    </span>
                    <div class="btn-task">
                        <button class="Editar">&#9998;</button>
                        <button class="Excluir">&#128465;</button>
                    </div>
                </li>
            </ul>
        </section>
    </main>
</body>
</html>

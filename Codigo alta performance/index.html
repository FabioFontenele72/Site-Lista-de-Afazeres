<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codigo alta perfomance</title>
    <link rel="stylesheet" href="style.css" />
    
</head>
<body>
    <header>
        <h1>Minhas Lista de Afazeres</h1>
    </header>

    <main>
        <section id="Formulario">
            <input type="text" id="nova-tarefa"
            placeholder="Digite..."/>
            <button id='btnAdicionar'>
                Adicionar
            </button>

        </section>
        <section id="lista de tarefas"> 
            <ul id="lista">
                <article class="bloco-tarefa">
                    <li class="tarefa">
                        Lavar a Sala
                    </li>
                    <article class="btn-task">
                        <button class="Editar">Editar</button>
                        <button class="Excluir">Excluir</button>
                    </article>
                </article>
                <article class="bloco-tarefa">
                    <li class="tarefa">
                        Dar Banho nos Cachorros
                    </li>
                    <article class="btn-task">
                        <button class="Editar">Editar</button>
                        <button class="Excluir">Excluir</button>
                    </article>
                </article>
                <article class="bloco-tarefa">
                    <li class="tarefa">
                        Lavar a Roupa
                    </li>
                    <article class="btn-task">
                        <button class="Editar">Editar</button>
                        <button class="Excluir">Excluir</button>
                    </article>
                </article>
            </ul>
        </section>
    </main>
</body>
</html>
